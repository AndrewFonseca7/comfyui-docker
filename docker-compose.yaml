services:
  comfyui:
    build:
      context: .
      args:
        TARGET: gpu
    expose:
      - "8188"
    volumes:
      - ./models:/app/models
      - ./output:/app/output
      - ./input:/app/input
      - ./comfyui-nodes/creaturia_nodes:/app/custom_nodes/creaturia_nodes
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  comfyui-cpu:
    build:
      context: .
      args:
        TARGET: cpu
    ports:
      - "8188:8188"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./models:/app/models
      - ./output:/app/output
      - ./input:/app/input
      - ./comfyui-nodes/creaturia_nodes:/app/custom_nodes/creaturia_nodes
    profiles: ["cpu", "dev"]
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    env_file:
      - path: .env
        required: false
    environment:
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-https://creator.andrewfonseca.dev}
    depends_on:
      comfyui:
        condition: service_started
        required: false
      comfyui-cpu:
        condition: service_started
        required: false
    profiles: ["gpu", "cpu", "dev"]
    restart: unless-stopped

  auth-sidecar:
    build: ./proxy/auth-sidecar
    volumes:
      - ./config/api-keys.json:/config/api-keys.json:ro
    environment:
      - COMFY_SESSION_SECRET=${COMFY_SESSION_SECRET:-}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    profiles: ["gpu", "cpu", "dev"]
    restart: unless-stopped

volumes:
  caddy_data:
