version: "3.8"

services:
  comfyui-gpu:
    build: .
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "7860:7860"
      - "8080:7860"  # Alternative port
    volumes:
      - ./aws-outputs:/home/user/app/output
      - ./aws-inputs:/home/user/app/input
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped